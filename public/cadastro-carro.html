<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project D / Cadastro Carro</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="shortcut icon" href="assets/imgs/Project_d_icon.png" type="image/x-icon">
    <script src="js/validações.js"></script>
</head>
<body>
    <main class="cadastro">
        <section class="container-cadastro-carro">

        <div id="container_foto">
            <a href="index.html">
                <img src="assets/imgs/Project_d_logo.png" alt="Logo do Project D" id="logo">
            </a>
            <div class="campo_foto_carro" id="div_foto">
                
            </div>
            <label for="url_foto">Link da Foto</label>
            <div class="campo url" id="campo_url">
                <img src="assets/icones/galeria-de-fotos.png" alt="">
                <input type="text" id="url_foto" oninput="verificarFotoCarro();verificarDigitar()" placeholder="Cole o Link da foto aqui">
            </div>
        </div>
        <div id="container_campos">
            
                <label for="ipt_marca">Marca do Carro</label>
                <div class="campo" id="campo_nome">
                    <img src="assets/icones/carro.png" alt="">
                    <input type="text" id="ipt_marca" placeholder="Digite a Marca do Carro" oninput="verificarDigitar()">
                </div>
                <label for="ipt_modelo">Modelo do Carro</label>
                <div class="campo" id="campo_modelo">
                    <img src="assets/icones/carro.png" alt="">
                    <input type="text" id="ipt_modelo" placeholder="Digite o Modelo do Carro" oninput="verificarDigitar()">
                </div>
                <p id="msg_email"></p>
                <label for="ipt_potencia">Potência</label>
                <div class="campo" id="campo_potencia">
                    <img src="assets/icones/motor.png" alt="">
                    <input type="text" id="ipt_potencia" placeholder="Digite a potência do Carro" oninput="verificarSenha(); verificarDigitar()">
                </div>
                <label for="ipt_tracao">Tração</label>
                <div class="campo" id="campo_tracao">
                    <img src="assets/icones/eixo.png" alt="">
                    <select id="slt_tracao">
                        <option value="FR">Traseira</option>
                        <option value="FF">Fronteira</option>
                        <option value="AWD">Integral</option>
                    </select>
                </div>
                <div id="div_mensagem">
                </div>
                <button onclick="cadastrar_carro()">Cadastrar</button>
                
        </div>
        </section>
    </main>
</body>
</html>
