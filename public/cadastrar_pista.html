<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project D / Cadastro pista</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="shortcut icon" href="assets/imgs/Project_d_icon.png" type="image/x-icon">
    <script src="./js/sessao.js"></script>
    <script src="js/validacoes.js"></script>
</head>
<body>
    <main class="cadastro-pista">
        <section class="container-cadastro-carro">

        <div id="container_foto">
            <a href="index.html">
                <img src="assets/imgs/Project_d_logo.png" alt="Logo do Project D" id="logo">
            </a>
            <div class="campo_foto_carro" id="div_foto">
                
            </div>
            <label for="url_foto">Link da Foto</label>
            <div class="campo url" id="campo_url">
                <img src="assets/icones/galeria-de-fotos.png" alt="">
                <input type="text" id="url_foto" oninput="verificarFotoCarro();verificarDigitarCad()" placeholder="Cole o Link da foto aqui">
            </div>
        </div>
        <div id="container_campos">
            
                <label for="ipt_pista">Nome da Pista</label>
                <div class="campo" id="campo_pista">
                    <input type="text" id="ipt_pista" placeholder="Digite o Nome da Pista" oninput="verificarDigitarCad()">
                </div>
                <label for="ipt_modelo">Descricao</label>
                <div class="campo text" id="campo_descricao">
                    <textarea id="txt_descricao" placeholder="Digite a Descrição da Pista" maxlength="255">

                    </textarea>
                </div>
                <p id="msg_email"></p>
                <label for="ipt_inclinacao">Inclinação</label>
                <div class="campo" id="campo_inclinacao">
                    <input type="text" id="ipt_inclinacao" placeholder="Digite a inclinação" maxlength="6" oninput="verificarDigitarCad()">
                </div>
                <label for="ipt_sentido_inclinacao">Sentido da Inclinação</label>
                <div class="campo" id="campo_sentido_inclinacao">
                    <select id="slt_tracao" onchange="verificarDigitarCad()">
                        <option value="nulo" disabled selected>Escolha o sentido</option>
                        <option value="Subida">Subida</option>
                        <option value="Descida">Descida</option>
                    </select>
                </div>
                <div id="div_mensagem">
                </div>
                <button onclick="cadastrarPista()">Cadastrar</button>
                
        </div>
        </section>
    </main>
</body>
</html>
<script>
     validarSessaoAdmin();
</script>
