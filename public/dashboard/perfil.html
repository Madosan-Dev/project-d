<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project D / Perfil</title>
    <script src="../js/sessao.js"></script>
    <link rel="stylesheet" href="../assets/style.css">
    <script src="../js/dashboards.js"></script>
    <script src="../js/atualizar.js"></script>
    <script src="../js/buscar.js"></script>
    <script src="../js/menuSair.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="shortcut icon" href="../assets/imgs/Project_d_icon.png" type="image/x-icon">
</head>
<body>
    <header class="container-menu">
        <img src="../assets/imgs/Project_d_logo.png" alt="Logo da Project D" id="logo">
        
        <div class="btn-head menu">
            <a href="pistas.html" >Pistas</a>
            <a href="perfil.html" class="active">Perfil do Piloto</a>
            <a href="garagem.html">Garagem</a>
            <a href="dashboard.html">Dashboard</a>
            <a onclick="abrirMenu()">Sair</a>
        </div>
    </header>
    <main class="container-perfil">
        <h2>プロフィール PERFIL</h2>
        <div id="container_foto_perfil">
            <div class="campo_foto perfil" id="div_foto">

            </div>

            <div class="container-nome">
                <h1 id="nome_usuario"></h1>
                <textarea id="descricao_perfil" readonly></textarea>
                <button onclick="alterarDescricao()" id="btn_alt"><span id="status_desc">Editar</span> Descricao</button>
                <button onclick="atualizarDescricao()" id="btn_up" style="display: none;">Salvar Descricao</button>
                <div id="div_mensagem"></div>
            </div>
        </div>
        <div class="container_grafico_perfil">
            <canvas id="perfil_corrida"></canvas>
            <canvas id="perfil_pista"></canvas>
        </div>
        
    </main>

    <div id="tela_escura" class="overlay" style="display:none;">
        <div class="menu_destaque">
            <h2>Deseja realmente sair?</h2>
            <div class="btn-head">
                <a onclick="limparSessao()">Sim</a>
                <a onclick="fecharMenu()">Não</a>
            </div>
        </div>
    </div>
</body>
</html>
